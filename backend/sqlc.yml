version: "2"
sql:
  - engine: "postgresql"
    queries: "db/query.sql"
    schema: "db/schema.sql"
    gen:
      go:
        package: "db"
        out: "db"
        emit_json_tags: true
        emit_interface: true
        emit_prepared_queries: false
        sql_package: "pgx/v5"
        overrides:
          - db_type: "geometry"
            go_type: "string"
            nullable: true
